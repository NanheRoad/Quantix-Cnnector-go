<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F5BD8"/>
      <stop offset="100%" stop-color="#0A3F9E"/>
    </linearGradient>
    <linearGradient id="glass" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <rect x="24" y="24" width="464" height="464" rx="112" fill="url(#bg)"/>
  <rect x="40" y="40" width="432" height="432" rx="96" fill="url(#glass)"/>

  <g fill="none" stroke="#FFFFFF" stroke-linecap="round" stroke-linejoin="round">
    <!-- Q ring -->
    <circle cx="230" cy="236" r="112" stroke-width="34"/>
    <!-- Q tail -->
    <path d="M302 308 L362 368" stroke-width="34"/>
  </g>

  <!-- Connector block -->
  <g>
    <rect x="316" y="136" width="86" height="132" rx="22" fill="#FFFFFF"/>
    <rect x="333" y="170" width="14" height="26" rx="7" fill="#0A3F9E"/>
    <rect x="352" y="170" width="14" height="26" rx="7" fill="#0A3F9E"/>
    <rect x="371" y="170" width="14" height="26" rx="7" fill="#0A3F9E"/>
  </g>

  <!-- Weight baseline -->
  <g fill="#FFFFFF">
    <rect x="132" y="336" width="196" height="18" rx="9"/>
    <rect x="166" y="360" width="128" height="18" rx="9" opacity="0.85"/>
  </g>
</svg>
